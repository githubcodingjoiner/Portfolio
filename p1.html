<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PORTFOLIO</title>
    <link rel="stylesheet" href="s1.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script> -->
    <style>
        body{
            background:url('https://img.freepik.com/premium-vector/night-sky-background-pastel-color_56745-81.jpg') ;
            background-repeat: repeat-x,repeat-y;
            background-size: 1500px;
        }
        h1 {
            margin-right: 250px;
            margin: 0;
            padding: 0;
            color: #111;
            font-size: 3em;
            text-align: center;
            align-items: center;
        }

        h1 span{
            align-items: center;
            display: table-cell;
            margin: 0;
            color: hsl(265, 81%, 64%);
            position: relative;
            padding: 0;
            align-items: center;
            animation: anim 3s linear infinite;
        }
        h1 span:nth-child(1){
            animation-delay: 0s;
        }
        h1 span:nth-child(2){
            animation-delay: 0.25s;
        }
        h1 span:nth-child(3){
            animation-delay: 0.5s;
        }
        h1 span:nth-child(4){
            animation-delay: 0.75s;
        }
        h1 span:nth-child(5){
            animation-delay: 1s;
        }
        h1 span:nth-child(6){
            animation-delay: 1.25s;
        }
        h1 span:nth-child(7){
            animation-delay: 1.5s;
        }
        h1 span:nth-child(8){
            animation-delay: 1.75s;
        }
        @keyframes anim {
            0% {
                color: #fff;
                filter: blur(2px);
                text-shadow: 0 0 10px hsl(265, 81%, 64%),
                    0 0 20px hsl(265, 81%, 64%),
                    0 0 30px hsl(265, 81%, 64%),
                    0 0 40px hsl(265, 81%, 64%),
                    0 0 80px hsl(265, 81%, 64%),
                    0 0 120px hsl(265, 81%, 64%),
                    0 0 200px hsl(265, 81%, 64%),
                    0 0 300px hsl(265, 81%, 64%),
                    0 0 400px hsl(265, 81%, 64%),
                    0 0 500px hsl(265, 81%, 64%),
                    0 0 600px hsl(265, 81%, 64%);
            }
            5%,
            95% {
                color: #bab5b5;
                filter: blur(0px);
                text-shadow: 0 0 10px none,
            }
        }
    </style>
</head>

<body>
    <h1>
        <span>M</span>
        <span>y</span>
        <span>_</span>
        <span>P</span>
        <span>O</span>
        <span>R</span>
        <span>T</span>
        <span>F</span>
        <span>O</span>
        <span>L</span>
        <span>I</span>
        <span>O</span>
    </h1>
    <nav>
        <div class=" container">
            <div class="item" id="Dashboard"><a href="dashboard.html" target="_blank" style="color: rgb(114, 56, 222);font-weight: 400;">
                    <i class='bx bxs-dashboard bx-lg'></i><br><span>Dashboard</span>
                </a></div>
            <div class="item" id="My Projects"><a href="https://github.com/githubcodingjoiner" target="_blank"  style="color: rgb(89, 21, 153);">
                    <i class='bx bxl-github bx-lg'></i><br>My Projects
                </a></div>
            <div class="item" id="Certifications"><a href="cert.html" target="_blank" style="color: rgb(89, 21, 153);">
                    <i class='bx bxs-certification bx-lg'></i><br>Achievements
                </a></div>
            <div class="item" id="My_contact"><a href="My_contact.html" target="_blank" style="color: rgb(89, 21, 153);">
                    <i class='bx bxl-messenger bx-lg'></i><br>My Contact
                </a>
            </div>
        </div>
    </nav>
</body>

</html>
