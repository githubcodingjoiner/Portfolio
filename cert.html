<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certifications</title>
</head>
<style>
    * {
        box-sizing:border-box;
        background-color: black;
    }

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
  padding-left:30px ;
}

/* Hide the images by default */
.mySlides {
  display:none;
}

/* Next & previous buttons */
.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  margin-top: -22px;
  padding: 16px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover {
  background-color: rgba(0,0,0,0.8);
}

/* Caption text */
.t {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* The dots/bullets/indicators */
.dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1.5s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}
@media only screen and (max-width: 250px) {
  .t {font-size: 11px}
}
</style>
<script src="script.js"></script>
<body>
    <!-- Slideshow container -->
<div class="slideshow-container">

    <!-- Full-width images with number and caption text -->
    <div class="mySlides fade">
      <div class="numbertext">1 / 8</div>
      <img src="Python.png" alt="#" style="width:93%;">
      <div class="t">Caption Text</div>
    </div>
  
    <div class="mySlides fade">

    <div class="mySlides fade">

    </div>

    <div class="mySlides fade">
        <div class="numbertext">4 / 8</div>
        <img src="ML(coursera).png" alt="#" style="width:93%">
        <div class="t">Caption Four</div>
    </div>
    
    <div class="mySlides fade">
        <div class="numbertext">5 / 8</div>
        <img src="MachineLearning(acmegrade).png" alt="#" style="width:93%">
        <div class="t">Caption Five</div>
    </div>

    <div class="mySlides fade">
        <div class="numbertext">6 / 8</div>
        <img src="cloudcomputing.png" alt="#" style="width:93%">
        <div class="t">Caption Six</div>
      </div>

      <div class="mySlides fade">
        <div class="numbertext">7 / 8</div>
        <img src="code_combat.png" alt="#" style="width:93%">

    <!-- Next and previous buttons -->

</body>
